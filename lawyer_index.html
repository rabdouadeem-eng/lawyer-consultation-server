<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Name] — Corporate & Civil Law Attorney</title>
    <meta name="description" content="[Name] — Experienced Corporate & Civil Law Attorney. Book a consultation today.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           DESIGN SYSTEM — Professional Legal Theme
           ============================================ */
        :root {
            --navy-900: #0a1628;
            --navy-800: #0f1f3a;
            --navy-700: #15294a;
            --navy-600: #1e3a5f;
            --charcoal: #2c3e50;
            --gold: #c9a961;
            --gold-light: #d4b876;
            --gold-dark: #a88840;
            --burgundy: #7a1f2b;
            --burgundy-light: #9a2c3a;
            --cream: #f8f5f0;
            --cream-dark: #ede7dc;
            --white: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #4a5568;
            --text-light: #718096;
            --border: #e2e8f0;

            --font-serif: 'Playfair Display', 'Noto Naskh Arabic', Georgia, serif;
            --font-sans: 'Inter', 'Cairo', -apple-system, sans-serif;
            --font-arabic: 'Noto Naskh Arabic', 'Cairo', serif;

            --section-padding: 6rem 0;
            --container-width: 1200px;
            --container-padding: 1.5rem;

            --shadow-sm: 0 2px 4px rgba(10, 22, 40, 0.06);
            --shadow-md: 0 4px 12px rgba(10, 22, 40, 0.08);
            --shadow-lg: 0 10px 30px rgba(10, 22, 40, 0.12);
            --shadow-xl: 0 20px 50px rgba(10, 22, 40, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.7;
            color: var(--text-primary);
            background: var(--cream);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body[dir="rtl"] {
            font-family: var(--font-arabic);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 var(--container-padding);
        }

        .section {
            padding: var(--section-padding);
            position: relative;
        }

        .section-header {
            text-align: center;
            max-width: 720px;
            margin: 0 auto 4rem;
        }

        .section-label {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold-dark);
            margin-bottom: 1rem;
            position: relative;
            padding: 0 2rem;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 1.25rem;
            height: 1px;
            background: var(--gold);
        }

        .section-label::before { left: 0; }
        .section-label::after { right: 0; }

        .section-title {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            color: var(--navy-900);
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        .section-subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2.25rem;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            border-radius: 2px;
            transition: var(--transition);
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--navy-900);
            border: 2px solid var(--gold);
        }

        .btn-primary:hover {
            background: var(--gold-light);
            border-color: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: transparent;
            color: var(--navy-900);
            border: 2px solid var(--navy-900);
        }

        .btn-secondary:hover {
            background: var(--navy-900);
            color: var(--white);
        }

        /* NAVIGATION */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 0;
            transition: var(--transition);
            border-bottom: 1px solid rgba(201, 169, 97, 0.1);
        }

        .navbar.scrolled {
            padding: 0.75rem 0;
            box-shadow: var(--shadow-md);
        }

        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--white);
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--navy-900);
            border-radius: 2px;
        }

        .logo-text {
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.25rem;
            align-items: center;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: var(--transition);
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: 0.6rem 1.5rem;
            font-size: 0.875rem;
        }

        .lang-toggle {
            color: var(--gold);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.4rem 0.75rem;
            border: 1px solid rgba(201, 169, 97, 0.3);
            border-radius: 2px;
            background: transparent;
            transition: var(--transition);
        }

        .lang-toggle:hover {
            background: rgba(201, 169, 97, 0.1);
            border-color: var(--gold);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            padding: 0.5rem;
        }

        .menu-toggle span {
            width: 24px;
            height: 2px;
            background: var(--white);
            transition: var(--transition);
        }

        .menu-toggle.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-700) 100%);
            position: relative;
            display: flex;
            align-items: center;
            padding: 8rem 0 4rem;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(201, 169, 97, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(122, 31, 43, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(201, 169, 97, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 169, 97, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 5rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text {
            color: var(--white);
        }

        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1.25rem;
            background: rgba(201, 169, 97, 0.1);
            border: 1px solid rgba(201, 169, 97, 0.25);
            border-radius: 2px;
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .hero-eyebrow::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 5.5vw, 4.25rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .hero-title .accent {
            color: var(--gold);
            font-style: italic;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.75);
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 540px;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .hero-actions .btn-secondary {
            color: var(--white);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .hero-actions .btn-secondary:hover {
            background: var(--white);
            color: var(--navy-900);
            border-color: var(--white);
        }

        .hero-stats {
            display: flex;
            gap: 2.5rem;
            padding-top: 2.5rem;
            border-top: 1px solid rgba(201, 169, 97, 0.2);
        }

        .hero-stat-value {
            font-family: var(--font-serif);
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .hero-stat-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hero-image {
            position: relative;
        }

        .photo-frame {
            position: relative;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--navy-600) 0%, var(--navy-800) 100%);
            border: 1px solid rgba(201, 169, 97, 0.3);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .photo-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            background:
                linear-gradient(135deg, rgba(201, 169, 97, 0.05) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent 0, transparent 20px, rgba(201, 169, 97, 0.02) 20px, rgba(201, 169, 97, 0.02) 21px);
        }

        .photo-placeholder svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .photo-corners::before,
        .photo-corners::after,
        .photo-corners > span::before,
        .photo-corners > span::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--gold);
        }

        .photo-corners::before {
            top: -8px;
            left: -8px;
            border-right: none;
            border-bottom: none;
        }

        .photo-corners::after {
            top: -8px;
            right: -8px;
            border-left: none;
            border-bottom: none;
        }

        .photo-corners > span::before {
            bottom: -8px;
            left: -8px;
            border-right: none;
            border-top: none;
        }

        .photo-corners > span::after {
            bottom: -8px;
            right: -8px;
            border-left: none;
            border-top: none;
        }

        .trust-badge {
            position: absolute;
            bottom: 30px;
            right: -20px;
            background: var(--gold);
            color: var(--navy-900);
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow-lg);
            text-align: center;
            max-width: 200px;
        }

        .trust-badge-value {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .trust-badge-text {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            line-height: 1.3;
        }

        /* ABOUT SECTION */
        .about {
            background: var(--white);
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 5rem;
            align-items: start;
        }

        .about-image {
            position: relative;
        }

        .about-image-main {
            aspect-ratio: 4/5;
            background: var(--cream);
            position: relative;
            overflow: hidden;
        }

        .about-image-main::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid var(--gold);
        }

        .about-image-accent {
            position: absolute;
            top: 40px;
            right: -40px;
            width: 60%;
            aspect-ratio: 1;
            background: var(--navy-900);
            z-index: -1;
        }

        .about-quote {
            position: absolute;
            bottom: -30px;
            left: -30px;
            background: var(--gold);
            color: var(--navy-900);
            padding: 2rem;
            max-width: 280px;
            box-shadow: var(--shadow-lg);
        }

        .about-quote-mark {
            font-family: var(--font-serif);
            font-size: 4rem;
            line-height: 0.5;
            margin-bottom: 0.5rem;
        }

        .about-quote p {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.5;
            font-weight: 500;
        }

        .about-text h2 {
            font-family: var(--font-serif);
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            color: var(--navy-900);
            line-height: 1.2;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .about-text .lead {
            font-size: 1.125rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .about-text p {
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            line-height: 1.8;
        }

        .credentials {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin: 2.5rem 0;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .credential {
            display: flex;
            gap: 1rem;
            align-items: start;
        }

        .credential-icon {
            width: 40px;
            height: 40px;
            background: var(--cream);
            color: var(--gold-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .credential-icon svg {
            width: 20px;
            height: 20px;
        }

        .credential-title {
            font-weight: 600;
            color: var(--navy-900);
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .credential-text {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.5;
        }

        /* PRACTICE AREAS */
        .practice-areas {
            background: var(--cream);
        }

        .practice-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        .practice-card {
            background: var(--white);
            padding: 2.5rem 2rem;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
        }

        .practice-card:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-lg);
            transform: translateY(-6px);
        }

        .practice-icon {
            width: 56px;
            height: 56px;
            background: var(--navy-900);
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .practic
